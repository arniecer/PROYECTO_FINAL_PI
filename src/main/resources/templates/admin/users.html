<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Admin Usuarios - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container admin-users">
 <h1>Gestionar Usuarios</h1>

 <table>
  <thead>
   <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Usuario</th>
    <th>Email</th>
    <th>Rol</th>
    <th>Fecha registro</th>
    <th>Acciones</th>
   </tr>
  </thead>
  <tbody>
   <tr th:each="u : ${users}">
    <td th:text="${u.id}">0</td>
    <td th:text="${u.name}">Nombre</td>
    <td th:text="${u.username}">Usuario</td>
    <td th:text="${u.email}">Email</td>
    <td th:text="${u.role}">Rol</td>
    <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">Fecha</td>
    <td>
     <a th:href="@{/admin/users/delete/{id}(id=${u.id})}" class="btn-small btn-danger"
      onclick="return confirm('¿Eliminar usuario?')">Eliminar</a>
    </td>
   </tr>
  </tbody>
 </table>

 <a href="/admin" class="btn">Volver al panel</a>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
