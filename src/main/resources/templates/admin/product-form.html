<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Formulario Producto - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container form-container">
    <h1 th:text="${product.id == null} ? 'Añadir Producto' : 'Editar Producto'">Formulario Producto</h1>

    <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">

        <label for="name">Nombre:</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="description">Descripción:</label>
        <textarea id="description" th:field="*{description}" rows="4"></textarea>

        <label for="price">Precio (€):</label>
        <input type="number" id="price" th:field="*{price}" step="0.01" required>

        <label for="imageFile">Imagen del producto:</label>
        <input type="file" id="imageFile" name="imageFile" accept="image/*">
        <span th:if="${product.image}" class="file-hint">Imagen actual: <span th:text="${product.image}"></span></span>

        <label for="category">Categoría:</label>
        <select id="category" th:field="*{category}">
            <option value="Salsas">Salsas</option>
            <option value="Chiles secos">Chiles secos</option>
            <option value="Snacks">Snacks</option>
        </select>

        <label for="scovilleLevel">Nivel Scoville (SHU):</label>
        <input type="number" id="scovilleLevel" th:field="*{scovilleLevel}" placeholder="Ej: 5000">

        <label for="countryOfOrigin">País de origen:</label>
        <input type="text" id="countryOfOrigin" th:field="*{countryOfOrigin}" placeholder="Ej: México">

        <label for="purchaseLink">Enlace de compra:</label>
        <input type="url" id="purchaseLink" th:field="*{purchaseLink}" placeholder="https://...">

        <label for="rating">Valoración:</label>
        <input type="number" id="rating" th:field="*{rating}" step="0.1" min="0" max="5">

        <button type="submit" class="btn">Guardar</button>
        <a href="/admin/products" class="btn btn-secondary">Cancelar</a>
    </form>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
