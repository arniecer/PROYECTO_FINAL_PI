<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Admin Productos - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container admin-products">
    <h1>Gestionar Productos</h1>
    <a href="/admin/products/new" class="btn">Añadir producto</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Scoville</th>
                <th>País</th>
                <th>Categoría</th>
                <th>Valoración</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">0</td>
                <td th:text="${product.name}">Nombre</td>
                <td th:text="${#strings.concat(product.price, '€')}">0€</td>
                <td th:text="${product.scovilleLevel} ? ${#strings.concat(product.scovilleLevel, ' SHU')} : '-'">0</td>
                <td th:text="${product.countryOfOrigin} ?: '-'">País</td>
                <td th:text="${product.category}">Categoría</td>
                <td th:text="${product.rating}">0</td>
                <td>
                    <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn-small">Editar</a>
                    <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn-small btn-danger"
                       onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a href="/admin" class="btn">Volver al panel</a>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
