<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Panel Admin - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container admin-dashboard">
    <h1>Panel de Administración</h1>

    <div class="admin-stats">
        <div class="stat-card">
            <h3>Productos</h3>
            <p class="stat-number" th:text="${productCount}">0</p>
            <a href="/admin/products" class="btn">Gestionar</a>
        </div>
        <div class="stat-card">
            <h3>Usuarios</h3>
            <p class="stat-number" th:text="${userCount}">0</p>
            <a href="/admin/users" class="btn">Gestionar</a>
        </div>
    </div>

    <div class="admin-links">
        <a href="/admin/products/new" class="btn">Añadir producto</a>
        <a href="/products" class="btn btn-secondary">Ver catálogo público</a>
    </div>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
