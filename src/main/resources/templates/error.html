<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Error - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container error-page">
 <div class="error-content">
  <h1>Oops!</h1>
  <h2 th:text="${status} ? ${status} + ' - ' + ${error} : 'Ha ocurrido un error'">Error</h2>
  <p th:text="${message} ?: 'Se ha producido un error inesperado.'">Mensaje</p>
  <a href="/" class="btn">Volver al inicio</a>
 </div>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
