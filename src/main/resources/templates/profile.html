<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Mi Perfil - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container profile">
    <h1>Mi Perfil</h1>

    <div class="profile-info">
        <p><strong>Nombre:</strong> <span th:text="${user.name}">Nombre</span></p>
        <p><strong>Usuario:</strong> <span th:text="${user.username}">Usuario</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">Email</span></p>
        <p><strong>Rol:</strong> <span th:text="${user.role}">Rol</span></p>
        <p><strong>Miembro desde:</strong> <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">Fecha</span></p>
    </div>

    <div class="profile-links">
        <a href="/logout" class="btn btn-secondary">Cerrar sesión</a>
    </div>

    <h2>Mis Reseñas</h2>
    <div th:if="${#lists.isEmpty(reviews)}">
        <p>Todavía no has escrito ninguna reseña. <a href="/products">Explora productos</a> para opinar.</p>
    </div>
    <div class="review" th:each="review : ${reviews}">
        <p><strong th:text="${review.product.name}">Producto</strong></p>
        <span th:utext="${#strings.repeat('⭐', review.rating)}"></span>
        <p th:text="${review.comment}">Comentario</p>
        <small th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}">Fecha</small>
        <a th:href="@{/products/{id}(id=${review.product.id})}" class="btn-small">Ver producto</a>
    </div>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
