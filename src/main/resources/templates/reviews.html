<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout::head('Mis Reseñas - GrandSpicy')}"></head>
<body>

<div th:replace="~{layout::header}"></div>

<section class="container">
    <h1>Mis Reseñas</h1>

    <div th:each="review : ${reviews}" class="review-card">
        <p><strong th:text="${review.product.name}">Producto</strong></p>
        <span th:utext="${#strings.repeat('⭐', review.rating)}"></span>
        <p th:text="${review.comment}">Comentario</p>
        <small th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}">Fecha</small>
    </div>

    <div th:if="${#lists.isEmpty(reviews)}">
        <p>No has escrito ninguna reseña todavía.</p>
    </div>
</section>

<div th:replace="~{layout::footer}"></div>

</body>
</html>
