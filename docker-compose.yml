# ========================================
# DOCKER COMPOSE DE GRANDSPICY
# ========================================

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: grandspicy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grandspicy
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - grandspicy_network

  app:
    build: .
    container_name: grandspicy-app
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/grandspicy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - grandspicy_network

volumes:
  mysql_data:

networks:
  grandspicy_network:
