services:
  mysql:
    image: mysql:8.0
    container_name: grandspicy-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grandspicy
    ports:
      - "3307:3306"
    volumes:
      - ./src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - grandspicy_network

  app:
    build: .
    container_name: grandspicy-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/grandspicy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: root
    networks:
      - grandspicy_network

  nginx:
    image: nginx:1.25
    container_name: grandspicy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src/main/webapp/img:/usr/share/nginx/html/img
      - ./src/main/webapp/images:/usr/share/nginx/html/images
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - grandspicy_network

  certbot:
    image: certbot/certbot
    container_name: grandspicy-certbot
    profiles:
      - ssl-setup
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  mysql_data:

networks:
  grandspicy_network:
